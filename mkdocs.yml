site_name: GitOps Fundamentals with Flux
site_url: https://workshop.platformfix.com/gitops
site_description: From Manual Deployments to AI-Assisted Operations
site_author: Steve Wade
repo_name: ""
repo_url: ""
edit_uri: ""
site_dir: public

# Page tree
nav:
  - Home: index.md
  - Agenda: agenda.md
  - Environment: access.md
  - Labs:
      - 0. Flux Operator Bootstrap: labs/0-bootstrap.md
      - 1. Your First GitOps Pipeline: labs/1-first-pipeline.md
      - 2. Multi-Environment Mastery: labs/2-multi-environment.md
      - 3. Helm Integration: labs/3-helm-integration.md
      - 4. Secret Management with SOPS: labs/4-sops-secrets.md
      - 5. Monitoring & Troubleshooting: labs/5-monitoring-troubleshooting.md
      - Flux MCP Server Demo: labs/flux-mcp-demo.md
  - Resources: resources.md
  - Instructor: about-instructor.md

# Configuration
theme:
  language: en
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.share
  icon:
    logo: material/delete-outline
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

# Custom CSS
extra_css:
  - stylesheets/extra.css

# Plugins
plugins:
  - search

# Extensions
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true

extra:
  generator: false
  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/stevendavidwade/
    - icon: fontawesome/brands/github-alt
      link: https://github.com/swade1987
    - icon: fontawesome/solid/paper-plane
      link: https://newsletter.platformfix.com

copyright: "&copy; 2026 Platform Fix. Delete before you add."
