apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: workshop-app
  namespace: flux-system
spec:
  interval: 5m
  path: ./examples/001-first-pipeline/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: workshop-apps
  targetNamespace: workshop-app
  wait: true
  timeout: 2m
