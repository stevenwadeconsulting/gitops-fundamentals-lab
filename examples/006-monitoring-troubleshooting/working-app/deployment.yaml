apiVersion: apps/v1
kind: Deployment
metadata:
  name: rollback-demo
  namespace: rollback-demo
  labels:
    app: rollback-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rollback-demo
  template:
    metadata:
      labels:
        app: rollback-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
