apiVersion: apps/v1
kind: Deployment
metadata:
  name: broken-app
  namespace: broken-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: broken-app
  template:
    metadata:
      labels:
        app: broken-app
    spec:
      containers:
        - name: app
          image: nginx:nonexistent-tag-that-will-fail
          ports:
            - containerPort: 80
