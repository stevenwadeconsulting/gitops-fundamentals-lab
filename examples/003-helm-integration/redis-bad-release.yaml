apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis-bad
  namespace: flux-system
spec:
  interval: 5m
  chart:
    spec:
      chart: redis
      version: ">=19.0.0 <20.0.0"
      sourceRef:
        kind: HelmRepository
        name: bitnami
      interval: 1h
  targetNamespace: redis-bad
  install:
    createNamespace: true
    remediation:
      retries: 3
  values:
    architecture: nonexistent-mode
